<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Strategic Lifecycle AI Framework — Functional Wireframe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0f1e; --bg2:#0b1120; --sidebar:#0c1326; --panel:#111a2e; --panel2:#0f1830;
    --line:#1e2a44; --line2:#27365a; --inputbg:#0a1124;
    --text:#e6edf6; --muted:#93a3bd; --faint:#5d6b86;
    --cyan:#22d3ee; --green:#34d399; --lime:#a3e635; --purple:#a78bfa; --blue:#38bdf8;
    --amber:#fbbf24; --pink:#f472b6; --rose:#fb7185; --teal:#2dd4bf;
    --primary:#5b7a16; --primary2:#6f9a1c;
    --mono:ui-monospace,"Cascadia Code","SF Mono",Menlo,Consolas,monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5}
  .app{display:flex;min-height:100vh}

  /* sidebar */
  .side{width:248px;flex:0 0 248px;background:var(--sidebar);border-right:1px solid var(--line);position:sticky;top:0;height:100vh;overflow-y:auto;padding:18px 0}
  .wordmark{padding:0 18px 16px;border-bottom:1px solid var(--line);margin-bottom:10px}
  .wordmark .logo{font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:.14em;color:var(--cyan);text-transform:uppercase;line-height:1.3}
  .wordmark .tag{font-size:10.5px;color:var(--faint);font-family:var(--mono);margin-top:4px}
  .navgroup{padding:12px 0 4px}
  .navgroup h4{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin:0;padding:6px 18px}
  .navitem{display:flex;align-items:center;gap:9px;padding:7px 18px;font-size:13px;color:var(--muted);cursor:pointer;border-left:2px solid transparent}
  .navitem:hover{background:rgba(255,255,255,.03);color:var(--text)}
  .navitem.active{background:rgba(34,211,238,.08);border-left-color:var(--cyan);color:#fff}
  .navitem .dot{width:6px;height:6px;border-radius:50%;flex:0 0 6px}
  .navitem .num{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--faint)}

  /* main */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:20;background:rgba(10,15,30,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:11px 26px;display:flex;align-items:center;gap:14px}
  .crumb{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .crumb b{color:var(--text)}
  .topbar .right{margin-left:auto;display:flex;align-items:center;gap:12px}
  .wf-badge{font-family:var(--mono);font-size:10.5px;color:var(--amber);border:1px solid #5a4a16;background:#19140a;padding:3px 9px;border-radius:999px}
  .toggle{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);cursor:pointer;user-select:none}
  .switch{width:36px;height:20px;border-radius:999px;background:#26334d;position:relative;transition:.15s;border:1px solid var(--line2)}
  .switch::after{content:"";position:absolute;width:14px;height:14px;border-radius:50%;background:#8a99b5;top:2px;left:2px;transition:.15s}
  body.show-annot .switch{background:#5b7a16;border-color:#6f9a1c}
  body.show-annot .switch::after{left:18px;background:#dff0b8}

  .content{padding:24px 26px 80px;max-width:1180px;width:100%}

  /* page header */
  .phead{display:flex;align-items:flex-start;gap:14px;margin-bottom:6px}
  .phead .t h1{font-family:var(--mono);font-size:22px;letter-spacing:.01em;text-transform:uppercase;color:var(--cyan);margin:0;font-weight:680}
  .phead .t .sub{color:var(--muted);font-size:13px;margin-top:5px;max-width:680px}
  .phead .actions{margin-left:auto;display:flex;gap:9px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .counter{font-family:var(--mono);font-size:12px;color:var(--muted);border:1px solid var(--line2);border-radius:7px;padding:6px 10px;background:var(--panel)}
  .counter b{color:var(--text)}
  .counter.full b{color:var(--rose)}
  .btn{font-size:12.5px;font-weight:600;padding:8px 13px;border-radius:8px;border:1px solid transparent;cursor:default;display:inline-flex;align-items:center;gap:7px}
  .btn.primary{background:var(--primary);color:#eaf6cf;border-color:var(--primary2)}
  .btn.primary.disabled{background:#1a2030;color:#566;border-color:var(--line);}
  .btn.ghost{background:transparent;border-color:var(--line2);color:var(--muted)}
  .btn.sm{padding:5px 9px;font-size:11.5px}

  /* badges */
  .badge{font-family:var(--mono);font-size:10.5px;padding:3px 9px;border-radius:999px;border:1px solid;text-transform:lowercase;white-space:nowrap}
  .b-draft{color:#9fb0c9;border-color:#3a486a;background:#141c30}
  .b-active{color:#6ee7b7;border-color:#15603f;background:#0b2118}
  .b-completed{color:#7dd3fc;border-color:#155e75;background:#082530}
  .b-archived{color:#7c89a3;border-color:#2c3954;background:#0f1626}
  .b-not_started{color:#9fb0c9;border-color:#3a486a;background:#141c30}
  .b-in_progress{color:#fcd34d;border-color:#5a4a16;background:#191407}
  .b-on_hold{color:#fda4af;border-color:#6b1f2a;background:#1f0d11}
  .b-suggested{color:#fcd34d;border-color:#5a4a16;background:#191407}
  .b-user_finalized{color:#6ee7b7;border-color:#15603f;background:#0b2118}

  /* cards / sections */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-top:16px}
  .card.tl{border-top:2px solid var(--cyan)}
  .sec-title{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:2px 0 14px;display:flex;align-items:center;gap:8px}
  .sec-title .ln{height:1px;background:var(--line);flex:1}
  .subhead{font-size:13px;font-weight:650;color:var(--text);margin:18px 0 10px}

  /* form fields */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 18px}
  .grid.three{grid-template-columns:1fr 1fr 1fr}
  .grid .full{grid-column:1/-1}
  @media(max-width:820px){.grid,.grid.three{grid-template-columns:1fr}}
  .field label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:5px;font-weight:600}
  .field label .req{color:var(--lime);margin-left:5px;font-size:10px;font-family:var(--mono)}
  .field label .comp{color:var(--blue);margin-left:5px;font-size:10px;font-family:var(--mono)}
  .input{background:var(--inputbg);border:1px solid var(--line2);border-radius:8px;padding:9px 11px;font-size:13px;color:var(--text);min-height:38px;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .input.area{min-height:64px;align-items:flex-start;white-space:pre-wrap;line-height:1.45}
  .input.ph{color:var(--faint)}
  .input.sel::after{content:"▾";color:var(--faint);font-size:11px}
  .input.ro{background:#0b1322;border-style:dashed;color:var(--muted)}
  .input.num{font-family:var(--mono)}

  /* chips */
  .chips{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
  .chip{font-size:11.5px;background:#0c1a2c;border:1px solid #1d3a52;color:#9fd6ea;padding:4px 9px;border-radius:7px;display:inline-flex;align-items:center;gap:6px}
  .chip .x{color:#5d7d92;font-size:12px}
  .chip.add{background:transparent;border-style:dashed;border-color:var(--line2);color:var(--faint);cursor:default}
  .chip.cap{background:#160c2c;border-color:#3a1d6b;color:#c4b1f0}

  /* tables */
  table.t{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:4px}
  table.t th{text-align:left;font-family:var(--mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);padding:8px 11px;border-bottom:1px solid var(--line)}
  table.t td{padding:9px 11px;border-bottom:1px solid #16203a;vertical-align:middle}
  table.t tr:last-child td{border-bottom:none}
  table.t tr.click td{cursor:default}
  table.t tr.sel{background:rgba(34,211,238,.06)}
  .mono{font-family:var(--mono)}

  /* list rows (cards) */
  .lrow{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:10px;background:var(--panel2);margin-bottom:9px}
  .lrow.sel{border-color:#2b6c80;background:rgba(34,211,238,.05)}
  .lrow .nm{font-weight:600;font-size:13.5px}
  .lrow .meta{color:var(--muted);font-size:12px;margin-top:2px}
  .lrow .rt{margin-left:auto;display:flex;align-items:center;gap:10px}

  /* annotation */
  .annot{display:none}
  body.show-annot .annot{display:block;border-left:2px dashed #6f5a16;background:rgba(251,191,36,.05);color:#e7cf97;font-size:11.5px;padding:7px 11px;border-radius:0 8px 8px 0;margin:8px 0 2px}
  body.show-annot .annot::before{content:"RULE  ";font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;color:var(--amber);font-weight:700}
  .annot.inl{margin:6px 0 0}

  /* kpi / stat */
  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  @media(max-width:820px){.kpis{grid-template-columns:1fr 1fr}}
  .kpi{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:14px 16px}
  .kpi .l{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint)}
  .kpi .v{font-size:26px;font-weight:700;margin-top:6px;font-family:var(--mono)}
  .kpi .d{font-size:11px;color:var(--muted);margin-top:3px}

  .note{background:#0c1626;border:1px solid var(--line);border-left:3px solid var(--blue);border-radius:9px;padding:11px 14px;font-size:12.5px;color:var(--muted);margin-top:14px}
  .note b{color:var(--text)}
  .flow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-family:var(--mono);font-size:12px;color:var(--muted);background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-top:14px}
  .flow .s{color:var(--text);background:#0c1a2c;border:1px solid #1d3a52;padding:3px 9px;border-radius:6px}
  .flow .ar{color:var(--faint)}
  .twocol{display:grid;grid-template-columns:1.3fr .9fr;gap:16px}
  @media(max-width:980px){.twocol{grid-template-columns:1fr}}
  .status-rail{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-family:var(--mono);font-size:11px}
  .status-rail .st{padding:3px 8px;border-radius:6px;border:1px solid var(--line2);color:var(--faint)}
  .status-rail .st.on{color:#fff;border-color:#2b6c80;background:rgba(34,211,238,.12)}
  .status-rail .ar{color:var(--faint)}
  h3.dt{font-size:15px;margin:0 0 2px;font-weight:660}
  /* AI assist */
  .ai-btn{font-size:12.5px;font-weight:600;padding:8px 13px;border-radius:8px;cursor:default;display:inline-flex;align-items:center;gap:7px;background:linear-gradient(180deg,#2a0f3a,#1c0b2c);border:1px solid #6b2d8a;color:#f0abfc}
  .ai-btn .sp{color:#e879f9}
  .ai-chip{font-size:10.5px;color:#e6b3f7;border:1px solid #5a2d75;background:#190f26;border-radius:6px;padding:3px 8px;margin:6px 0 0;cursor:default;display:inline-flex;gap:5px;align-items:center;width:max-content}
  .ai-panel{border:1px solid #5a2d75;border-left:3px solid #e879f9;background:linear-gradient(180deg,rgba(232,121,250,.07),rgba(232,121,250,.02));border-radius:11px;padding:14px 16px;margin-top:14px}
  .ai-panel .h{display:flex;align-items:center;gap:9px;margin-bottom:9px}
  .ai-panel .h .ttl{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#f0abfc}
  .ai-panel .cost{margin-left:auto;font-family:var(--mono);font-size:10px;color:#c79bdb;border:1px solid #4a2560;border-radius:999px;padding:2px 9px}
  .ai-panel .draft{background:#0b1120;border:1px dashed #4a2560;border-radius:8px;padding:11px 13px;font-size:12.5px;color:var(--text);line-height:1.5}
  .ai-panel .draft .row{display:flex;gap:8px;padding:3px 0}
  .ai-panel .draft .row .fl{color:#b07fc8;font-family:var(--mono);font-size:11px;min-width:150px;flex:0 0 150px}
  .ai-panel .acts{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
  .ai-acc{font-size:11.5px;font-weight:600;padding:6px 11px;border-radius:7px;cursor:default;border:1px solid}
  .ai-acc.go{background:#15331f;border-color:#1f6b3f;color:#86efac}
  .ai-acc.gh{background:transparent;border-color:var(--line2);color:var(--muted)}
  .ai-banner{display:flex;align-items:center;gap:10px;border:1px solid #5a2d75;border-left:3px solid #e879f9;background:linear-gradient(180deg,rgba(232,121,250,.08),rgba(232,121,250,.02));border-radius:10px;padding:10px 14px;margin-top:14px;font-size:12.5px;color:#e6b3f7}
  .ai-banner .sp{color:#e879f9;font-size:14px}
  .field.ai-sug .input{border-color:#6b2d8a;box-shadow:inset 3px 0 0 #e879f9;background:#120c1e}
  .field.ai-sug label .tag,.field.edited label .tag{font-size:9px;font-family:var(--mono);margin-left:7px;border-radius:4px;padding:1px 6px;letter-spacing:.04em}
  .field.ai-sug label .tag{color:#e879f9;border:1px solid #5a2d75}
  .field.edited label .tag{color:#86efac;border:1px solid #1f6b3f}
  /* discovery roll-down builder */
  .rd{margin-top:16px}
  .rd-lvl{display:flex;gap:13px;align-items:flex-start}
  .rd-num{flex:0 0 28px;width:28px;height:28px;border-radius:50%;background:#190f26;border:1px solid #5a2d75;color:#e6b3f7;font-family:var(--mono);font-size:12px;display:flex;align-items:center;justify-content:center;margin-top:1px}
  .rd-body{flex:1;min-width:0;padding-bottom:4px}
  .rd-lh{display:flex;align-items:baseline;gap:9px;margin-bottom:9px}
  .rd-lh-nm{font-family:var(--mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--text)}
  .rd-lh-ct{font-size:11px;color:var(--faint)}
  .rd-arrow{margin:1px 0 1px 13px;color:#6b2d8a;font-size:15px;line-height:1.15}
  .rd-cap{font-size:11.5px;color:var(--faint);margin-top:6px}
  /* landing / public page */
  .land-hero{padding:4px 0 2px}
  .land-hero h2{font-size:25px;line-height:1.22;margin:8px 0 10px;color:var(--text);max-width:880px}
  .land-hero .tag{color:var(--muted);font-size:14px;max-width:780px;margin-bottom:16px;line-height:1.5}
  .eyebrow-pill{display:inline-block;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:#fbbf24;border:1px solid #6b5320;background:#1a1407;border-radius:999px;padding:3px 11px}
  a.btn.dl{color:#86efac;border-color:#1f6b3f;background:#08221c;text-decoration:none}
  .hov{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:#7dd3fc;border:1px solid #1e4a6b;background:#08182a;border-radius:999px;padding:2px 9px;white-space:nowrap}
  .auth-card{max-width:470px;margin:6px auto}
  .lnk{color:var(--cyan);cursor:pointer;border-bottom:1px solid transparent}
  .lnk:hover{border-bottom-color:var(--cyan)}
  /* ============================================================
     STAR FOX 64 · HUD THEME   (chrome + headings only;
     body copy, inputs, and tables stay in the readable sans/mono)
     ============================================================ */
  :root{
    --pixel:"Press Start 2P", var(--mono);
    --hud-green:#62ffae; --hud-blue:#48d6ff; --hud-amber:#ffd23f; --hud-red:#ff6b7a;
    --hud-line:rgba(72,214,255,.22);
    --glow-g:0 0 10px rgba(98,255,174,.5); --glow-b:0 0 10px rgba(72,214,255,.45);
  }
  /* deep-space backdrop + starfield (fixed) */
  body{
    background:
      radial-gradient(1.5px 1.5px at 12% 22%, rgba(255,255,255,.55), transparent 60%),
      radial-gradient(1.5px 1.5px at 68% 14%, rgba(180,220,255,.5), transparent 60%),
      radial-gradient(1px 1px at 40% 70%, rgba(255,255,255,.4), transparent 60%),
      radial-gradient(1px 1px at 84% 58%, rgba(180,220,255,.45), transparent 60%),
      radial-gradient(1.5px 1.5px at 26% 86%, rgba(255,255,255,.4), transparent 60%),
      radial-gradient(1px 1px at 92% 88%, rgba(255,255,255,.35), transparent 60%),
      radial-gradient(1100px 620px at 88% -12%, #16244f 0%, transparent 62%),
      radial-gradient(900px 560px at -8% 112%, #1c1340 0%, transparent 60%),
      var(--bg);
    background-attachment:fixed;
  }
  /* CRT scanline overlay (subtle, above everything, non-interactive) */
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9998;
    background:repeating-linear-gradient(rgba(0,0,0,0) 0 2px, rgba(0,8,16,.16) 2px 3px);opacity:.5}

  /* pixel HUD typography — SHORT labels only */
  .wordmark .logo, .navgroup h4, .sec-title, .phead .t h1,
  .kpi .l, .eyebrow-pill, .ai-panel .h .ttl{
    font-family:var(--pixel) !important; letter-spacing:0 !important; font-weight:400 !important;
  }
  .wordmark .logo{font-size:10.5px;line-height:1.7;color:var(--hud-green);text-shadow:var(--glow-g)}
  .wordmark .tag{color:var(--hud-blue);opacity:.8}
  .navgroup h4{font-size:7.5px;color:var(--hud-blue);opacity:.85;line-height:1.7}
  .phead .t h1{font-size:13px;line-height:1.5;color:var(--hud-green);text-shadow:var(--glow-g)}
  .sec-title{font-size:9px;color:var(--hud-amber);text-shadow:0 0 7px rgba(255,210,63,.35)}
  .kpi .l{font-size:7.5px;color:var(--hud-blue)}
  .eyebrow-pill{font-size:8px;color:var(--hud-amber);border-color:#6b5320}
  .ai-panel .h .ttl{font-size:8.5px}

  /* topbar = HUD bar with corner brackets */
  .topbar{border-bottom:1px solid var(--hud-line);box-shadow:0 1px 0 rgba(98,255,174,.12),0 8px 24px -16px rgba(72,214,255,.5)}
  .topbar::before,.topbar::after{content:"";position:absolute;top:6px;width:15px;height:15px;pointer-events:none}
  .topbar::before{left:8px;border-left:2px solid var(--hud-green);border-top:2px solid var(--hud-green)}
  .topbar::after{right:8px;border-right:2px solid var(--hud-green);border-top:2px solid var(--hud-green)}
  .crumb{color:var(--hud-blue)} .crumb b{color:#dff6ff}
  .hud-shields{font-family:var(--pixel);font-size:7px;color:var(--hud-green);letter-spacing:1px;display:flex;align-items:center;gap:6px;text-shadow:var(--glow-g)}
  .hud-shields .bars{letter-spacing:-2px}
  @media(max-width:820px){.hud-shields{display:none}}

  /* sidebar = cockpit panel */
  .side{border-right:1px solid var(--hud-line);box-shadow:inset -1px 0 0 rgba(72,214,255,.12)}
  .wordmark{border-bottom:1px solid var(--hud-line)}
  .navitem:hover{background:rgba(72,214,255,.06)}
  .navitem.active{background:linear-gradient(90deg,rgba(98,255,174,.14),transparent);border-left-color:var(--hud-green);color:#eafff4;box-shadow:inset 0 0 14px rgba(98,255,174,.06)}
  .navitem.active .dot{box-shadow:0 0 8px currentColor}

  /* cards = HUD frames with a corner bracket */
  .card{position:relative;border-color:var(--hud-line);box-shadow:0 0 0 1px rgba(72,214,255,.04),0 18px 40px -28px rgba(0,0,0,.8)}
  .card::before{content:"";position:absolute;top:-1px;left:-1px;width:14px;height:14px;border-left:2px solid var(--hud-green);border-top:2px solid var(--hud-green);border-radius:3px 0 0 0;opacity:.55;pointer-events:none}
  .sec-title .ln{background:linear-gradient(90deg,var(--hud-line),transparent)}

  /* HUD buttons (mono, not pixel, so they stay readable) */
  .btn{border-radius:4px;letter-spacing:.04em;text-transform:uppercase;font-family:var(--mono);font-size:11px}
  .btn.primary{background:linear-gradient(180deg,#1c5a32,#123f22);border-color:var(--hud-green);color:#d6ffe6;box-shadow:var(--glow-g),inset 0 0 12px rgba(98,255,174,.12)}
  .btn.ghost{border-color:var(--hud-blue);color:var(--hud-blue)}
  a.btn.dl{border-color:var(--hud-green);color:var(--hud-green);box-shadow:var(--glow-g)}

  /* HUD accents on data chrome */

      <tr><td><b>Phase 1 · Strategy</b></td><td class="mono" style="color:var(--muted)">strategic_objectives · strategic_objective_metrics · business_architecture_components · value_streams · key_activities · business_capabilities · business_processes · stakeholders_personas · information_concepts · business_impacts</td></tr>
      <tr><td><b>Phase 2 · Delivery</b></td><td class="mono" style="color:var(--muted)">lean_business_cases · discovery · features · requirements · conceptual_deliverables · implementation</td></tr>

  </div>
  <div class="note"><b>Reading this wireframe:</b> every page is populated with one consistent example so you can see the data each screen holds. Flip <b>“Show business rules”</b> (top-right) to overlay the cardinality limits, validation gates, status lifecycles, the financial model, and the governance pattern in context.</div>`;

PAGES.objectives=()=>{const o=D.objective;return `
  <div class="phead"><div class="t"><h1>Strategic Objectives</h1><div class="sub">Executive intent and strategic value. The top of the lifecycle — forecast only; actuals roll up here from implementation.</div></div><div class="actions"><span class="counter">Objectives <b>1 / 3</b></span>${aiBtn()}<span class="btn primary">New objective</span></div></div>
  ${annot('Max 3 per workspace. Draft needs only the initiative name; activating requires the five gate fields marked below.')}
  <div class="card">
    ${secTitle('Objectives')}
    <div class="lrow sel"><div><div class="nm">${o.name}</div><div class="meta">Cost reduction · ${o.metrics.length} metrics · 1 business case</div></div><div class="rt">${badge(o.status)}</div></div>
  </div>

  <div class="twocol">
    <div>
    <div class="card tl">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px"><h3 class="dt">${o.name}</h3>${badge(o.status)}</div>
      ${statusRail(['draft','active','completed','archived'],o.status)}
      ${annot('draft → active → completed; archive from any state; reactivate returns to draft, then re-promote (re-promotion re-checks the gate fields).')}
      ${aiBanner('“Draft with AI” fills the fields below in one call — edit any of them inline, then Save. Nothing is stored until you save.')}
      ${annot('One structured call fills every empty field at once — far cheaper than assisting field-by-field. The values land in the editable fields; the user edits in place and nothing is persisted until they save through the normal endpoint.')}
      ${secTitle('Strategic framing')}
      <div class="grid">
        ${F('Strategic Initiative Name',o.name,{req:true})}
        ${S('Strategic Value Category','Cost reduction',{req:true})}
        ${F('Executive Objective',o.executiveObjective,{area:true,full:true,req:true})}
        ${F('Problem / Opportunity Statement',o.problem,{area:true,full:true,req:true})}
        ${F('Value Hypothesis',o.valueHypothesis,{area:true,full:true,req:true})}
        ${F('Expected Business Outcome',o.outcome,{area:true,full:true})}
        ${F('Financial Impact (qualitative)',o.financialImpact,{area:true,full:true})}
        ${F('Cost of Inaction',o.inaction,{area:true})}
        ${F('Current Limitation',o.limitation,{area:true})}
        ${S('Problem Type','Internal')}
        ${F('Impacted Teams',o.teams)}
        ${S('Expected Value Type','Financial')}
        ${F('Value Realization Timeframe',o.timeframe)}
        ${F('Value Measurement Approach',o.measurement,{area:true,full:true})}
        ${F('Target Year',o.year)}${F('Target Window',o.start+'  →  '+o.end)}
      </div>
      ${secTitle('Success metrics · integer baseline / target')}
      <table class="t"><thead><tr><th>Metric</th><th>Category</th><th>Baseline</th><th>Target</th><th>Unit</th><th>Timeframe</th></tr></thead><tbody>
        ${o.metrics.map(m=>`<tr><td><b>${m.name}</b></td><td class="mono" style="color:var(--muted)">${m.cat}</td><td class="mono">${m.base.toLocaleString()}</td><td class="mono" style="color:var(--green)">${m.target.toLocaleString()}</td><td class="mono" style="color:var(--muted)">${m.unit}</td><td style="color:var(--muted)">${m.tf}</td></tr>`).join('')}
      </tbody></table>
      <div style="margin-top:8px"><span class="btn ghost sm">+ Add metric</span></div>
      ${annot('Metrics are a child table; baseline/target are integers (whole numbers), not money floats.')}
      ${secTitle('Selected architecture (optional)')}
      <div class="subhead" style="margin-top:0">Value streams</div>${chips(o.streams,{add:'select existing'})}
      <div class="subhead">Capabilities</div>${chips(o.caps,{cap:true,add:'select existing'})}
      ${annot('An objective directly selects existing value streams and capabilities — the pool is the whole company architecture, including anything established during discovery (origin: discovery). Its full architecture footprint is the union across its cases.')}
    </div>
    </div>

    <div>
    <div class="card" style="border-top:2px solid var(--rose)">
      ${secTitle('Financials — computed')}
      <div class="kpi" style="margin-bottom:10px"><div class="l">Forecast value <span style="color:var(--blue)">computed</span></div><div class="v" style="color:var(--blue);font-size:22px">${money(o.forecastRollup)}</div><div class="d">Σ of this objective's case forecasts</div></div>
      <div class="kpi" style="margin-bottom:10px"><div class="l">Actual value <span style="color:var(--blue)">computed</span></div><div class="v" style="color:var(--green);font-size:22px">${money(o.actualRollup)}</div><div class="d">rolled up from implementation allocations</div></div>
      <div class="kpi"><div class="l">Realization</div><div class="v" style="font-size:22px">41%</div><div class="d">actual ÷ forecast</div></div>
      ${annot('The objective NEVER stores actuals. Both numbers here are read-only: forecast = sum of case forecasts; actual = sum of implementation value-stream allocations under this objective. Actuals are entered only on the Implementation screen.')}
    </div>
    <div class="note"><b>Why no input here?</b> Money is entered downstream (case forecasts, implementation actuals) and surfaced upward. Keeping the objective read-only is what makes the roll-up trustworthy.</div>
    </div>
  </div>`;};

const listDetail=(cfg)=>{
  const rows=cfg.rows.map((r,i)=>`<div class="lrow ${i===0?'sel':''}"><div><div class="nm">${r.name}</div><div class="meta">${r.meta}</div></div><div class="rt">${badge(r.status)}</div></div>`).join('');
  return `<div class="phead"><div class="t"><h1>${cfg.title}</h1><div class="sub">${cfg.sub}</div></div><div class="actions">${cfg.counter?`<span class="counter${cfg.full?' full':''}">${cfg.counter}</span>`:''}<span class="btn primary${cfg.full?' disabled':''}">${cfg.addLabel||'New'}</span></div></div>
  ${cfg.headAnnot?annot(cfg.headAnnot):''}
  <div class="card">${secTitle(cfg.listTitle||'Records')}${rows}</div>
  <div class="card tl">${secTitle(cfg.formTitle||'Detail')}${cfg.form}</div>`;
};

    <div class="rd">
      <div class="rd-lvl"><div class="rd-num">1</div><div class="rd-body">
        <div class="rd-lh"><span class="rd-lh-nm">Impacted business areas</span><span class="rd-lh-ct">the trigger</span></div>
        <table class="t"><thead><tr><th>Impacted area</th><th>Severity</th><th>Origin</th></tr></thead><tbody>
          <tr><td><b>Last-mile cost overlap</b></td><td class="mono" style="color:#fb7185">high</td><td>${originBadge('discovery')}</td></tr>
          <tr><td><b>Linehaul scheduling gaps</b></td><td class="mono" style="color:#fbbf24">medium</td><td>${originBadge('discovery')}</td></tr>
        </tbody></table>
        <div style="margin-top:8px"><span class="btn ghost sm">+ Add impacted area</span></div>
        <div class="rd-cap">Identifying impacted areas is what initiates the architecture — nothing below exists until an area is captured.</div>
      </div></div>
      <div class="rd-arrow">↓</div>

      <div class="rd-lvl"><div class="rd-num">2</div><div class="rd-body">
        <div class="rd-lh"><span class="rd-lh-nm">Business architecture</span><span class="rd-lh-ct">one per workspace</span></div>
        <div class="lrow" style="margin-bottom:0"><div><div class="nm">FedEx Enterprise Architecture</div><div class="meta">unified pickup-and-delivery operating model</div></div><div class="rt">${originBadge('discovery')}<span class="btn ghost sm">Open</span></div></div>
        <div class="rd-cap">Created here if it doesn't exist yet; if the strategic phase already built one, that same record is extended.</div>
      </div></div>
      <div class="rd-arrow">↓</div>

      <div class="rd-lvl"><div class="rd-num">3</div><div class="rd-body">
        <div class="rd-lh"><span class="rd-lh-nm">Value streams</span><span class="rd-lh-ct">2 / 6</span></div>
        <div class="lrow" style="margin-bottom:0"><div><div class="nm">Pickup-to-Delivery (Unified)</div><div class="meta">future state · addresses last-mile cost overlap</div></div><div class="rt">${originBadge('discovery')}</div></div>
        <div style="margin-top:8px"><span class="btn ghost sm">+ Add value stream</span></div>
        <div class="rd-cap">Requires the architecture to exist first — which is why it sits one level below it in the roll-down.</div>
      </div></div>
      <div class="rd-arrow">↓</div>

      <div class="rd-lvl"><div class="rd-num">4</div><div class="rd-body">
        <div class="rd-lh"><span class="rd-lh-nm">Key activities</span><span class="rd-lh-ct">stages of the value stream</span></div>
        ${chips(['1 · Schedule pickup','2 · Optimize route'],{add:'add activity'})}
        <div class="rd-cap">The ordered stages of each value stream; each new one is tagged ${originBadge('discovery')}.</div>
      </div></div>
      <div class="rd-arrow">↓</div>

      <div class="rd-lvl"><div class="rd-num">5</div><div class="rd-body">
        <div class="rd-lh"><span class="rd-lh-nm">Supporting components</span><span class="rd-lh-ct">reference existing or create new</span></div>
        <div class="subhead" style="margin-top:0">Capabilities</div>${chips(['Network Optimization','Dynamic Routing'],{cap:true,add:'reference or create'})}
        <div class="subhead">Business processes</div>${chips(['Route planning'],{add:'reference or create'})}
        <div class="subhead">Stakeholders / personas</div>${chips(d.personasL,{add:'reference or create'})}
        <div class="subhead">Information concepts</div>${chips(d.infoL,{add:'reference or create'})}
        <div class="rd-cap">Same reference-or-create pattern the findings use — capabilities, processes, personas, and information concepts all hang off the architecture, each new one tagged ${originBadge('discovery')}.</div>
      </div></div>
    </div>

    <p class="note" style="margin-top:14px;border-left:2px solid #2dd4bf;padding-left:11px">Everything built here joins the company's one-per-workspace architecture, so it is immediately reusable. A value stream or capability created in this discovery appears in the “select existing” pool the next time the user creates a strategic objective — no copying, no re-entry. <b>Origin is provenance, not ownership:</b> an ${originBadge('discovery')} component is scoped to the workspace exactly like an ${originBadge('architecture')} one, and any objective or case can link it.</p>
    ${annot('Every architecture entity carries an origin flag (architecture | discovery), so the whole stack can be created here with no new link tables. The roll-down order is the existing FK hierarchy: architecture → value streams → key activities, with capabilities / processes / personas / information concepts hanging off the architecture. The strategic-phase path still exists — this is the same model entered from discovery.')}
  </div>`;};

PAGES.features=()=>{const f=D.features[0];return listDetail({title:'Features',sub:'Solution pieces that enable a capability. Belong to a business case.',counter:'Features <b>3</b>',addLabel:'New feature',headAnnot:'A feature optionally enables one capability — this is how features connect back to value streams.',
  rows:D.features.map(x=>({name:x.name,meta:`${x.type.replace(/_/g,' ')} · enables ${x.cap} · ${x.priority} priority`,status:x.status})),
  form:`<div class="grid">${F('Feature Name',f.name)}${S('Feature Type','Operational')}${S('Priority','High')}${S('Enables Capability',f.cap)}${F('Description','Single prioritized dispatch queue spanning Express and Ground.',{area:true,full:true})}</div>
  <div class="subhead">Requirements under this feature</div>
  <table class="t"><thead><tr><th>Requirement</th><th>Type</th><th>Priority</th><th>Status</th></tr></thead><tbody>${D.requirements.filter(r=>r.feat===f.name).map(r=>`<tr><td><b>${r.name}</b></td><td class="mono" style="color:var(--muted)">${r.type.replace(/_/g,' ')}</td><td>${r.priority}</td><td>${badge(r.status)}</td></tr>`).join('')||'<tr><td colspan=4 style="color:var(--faint)">none yet</td></tr>'}</tbody></table>`});};

PAGES.requirements=()=>{const r=D.requirements[0];return listDetail({title:'Requirements',sub:'Detailed specifications under a feature.',counter:'Requirements <b>2</b>',addLabel:'New requirement',
  rows:D.requirements.map(x=>({name:x.name,meta:`${x.type.replace(/_/g,' ')} · under “${x.feat}”`,status:x.status})),
  form:`<div class="grid">${F('Requirement Name',r.name)}${S('Parent Feature',r.feat)}${S('Requirement Type','Functional')}${S('Priority','High')}${F('Acceptance Criteria',r.crit,{area:true,full:true})}</div>
  ${annot('requirement_type is one of functional, non_functional, data, integration, security.')}`});};

PAGES.deliverables=()=>{const byType=Object.fromEntries(D.deliverables.map(d=>[d.type,d]));return `
  <div class="phead"><div class="t"><h1>Conceptual Deliverables</h1><div class="sub">The 12 outputs for a business case. Generated from traceability data, edited, then saved as final.</div></div><div class="actions"><span class="counter">Generated <b>3 / 12</b></span></div></div>
  ${annot('Governance gate: each deliverable is a SUGGESTION the system seeds from linked data. The user edits it and clicks “Save as final” (source: suggested → user_finalized). No auto-regeneration. The future AI layer plugs in here with no schema change.')}
  <div class="card"><div class="flow"><span class="s">Generate from data</span><span class="ar">→</span><span class="s" style="color:#fcd34d">Suggested</span><span class="ar">→ edit →</span><span class="s" style="color:#6ee7b7">Finalized</span></div></div>
  <div class="card">
    ${secTitle('Deliverables for “Consolidate Pickup Operations”')}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px">
    ${DELIV_TYPES.map(([t,label])=>{const d=byType[t];const right=d?`${badge(d.source)} <span class="btn ghost sm">${d.source==='suggested'?'Edit · Save final':'Open'}</span>`:`<span class="ai-btn" style="padding:5px 9px;font-size:11.5px"><span class="sp">✦</span>Generate</span>`;return `<div class="lrow" style="margin-bottom:0"><div><div class="nm" style="font-size:13px">${label}</div><div class="meta">${d?d.title:'<span style="color:var(--faint)">not generated</span>'}</div></div><div class="rt">${right}</div></div>`;}).join('')}
    </div>
    ${annot('Deliverables are the one place a LARGER model is used (heavier synthesis from the traceability data) — one call per deliverable, on demand. The draft returns as a suggestion; it is not stored until the user saves it.')}
  </div>`;};

PAGES.implementation=()=>{const im=D.implementation;const allocCost=im.allocations.reduce((a,x)=>a+x.cost,0);const allocVal=im.allocations.reduce((a,x)=>a+x.value,0);return `
  <div class="phead"><div class="t"><h1>Implementation</h1><div class="sub">Where the work ships and the actual numbers are recorded — once, per value stream.</div></div><div class="actions">${badge(im.status)}</div></div>
  ${annot('Exactly one implementation per business case. THIS is the only place actuals are entered. They resolve two ways: upward to the objective and sideways to each value stream.')}
  <div class="note">Implementation for <b>${im.caseLink}</b></div>
  <div class="twocol">
   <div><div class="card tl">
    ${secTitle('Implementation record')}
    ${statusRail(['not_started','in_progress','completed','on_hold'],im.status)}
    <div class="grid" style="margin-top:14px">
      ${F('Actual Cost',money(im.actualCost),{num:true})}
      ${F('Actual Value',money(im.actualValue),{num:true})}
      ${S('Value Type','Cost savings')}
      ${S('Status','In progress')}
      ${F('Start Date',im.start)}
      ${F('Completion Date','',{ph:'—'})}
      ${F('Outcome Notes',im.notes,{area:true,full:true})}
    </div>
    ${secTitle('Actuals by value stream')}
    <table class="t"><thead><tr><th>Value stream</th><th>Allocated cost</th><th>Allocated value</th></tr></thead><tbody>
      ${im.allocations.map(a=>`<tr><td><b>${a.stream}</b></td><td class="mono">${money(a.cost)}</td><td class="mono" style="color:var(--green)">${money(a.value)}</td></tr>`).join('')}
      <tr><td class="mono" style="color:var(--muted)">Total</td><td class="mono" style="color:var(--muted)">${money(allocCost)}</td><td class="mono" style="color:var(--muted)">${money(allocVal)}</td></tr>
    </tbody></table>
    <div style="margin-top:8px"><span class="btn ghost sm">+ Add value-stream allocation</span></div>
    ${annot('Each row is the per-stream entry point for actuals (implementation_value_streams). These same numbers feed the per-stream view and the objective roll-up.')}
   </div></div>
   <div>
    <div class="card" style="border-top:2px solid var(--rose)">
     ${secTitle('Where these numbers go')}
     <div class="kpi" style="margin-bottom:10px"><div class="l">↑ Objective roll-up</div><div class="v" style="font-size:18px;color:var(--green)">${money(im.actualValue)}</div><div class="d">added to Network 2.0 actuals (computed)</div></div>
     <div class="kpi"><div class="l">↔ Per value stream</div><div class="v" style="font-size:18px;color:var(--cyan)">2 streams</div><div class="d">surfaced on each stream's actuals</div></div>
     ${annot('Entered once here; surfaced in two places. The objective never has an editable actuals field — it reads this.')}
    </div>
   </div>
  </div>`;};

PAGES.ai=()=>`
  <div class="phead"><div class="t"><h1>AI Assistance</h1><div class="sub">Helps users fill in each component. Backend-mediated, stateless, and tuned to keep API spend low.</div></div><div class="actions">${aiBtn('Draft with AI')}</div></div>
  ${annot('The AI layer adds endpoints only — zero new tables. Suggestions live in the browser until saved through the normal entity endpoints.')}
  <div class="card tl">
    ${secTitle('How it works')}
    <div class="flow"><span class="s">✦ Draft with AI</span><span class="ar">→ one structured call →</span><span class="s">AI suggestion</span><span class="ar">→ review / edit →</span><span class="s" style="color:#86efac">Save · normal endpoint</span></div>
    <div style="margin-top:9px;color:var(--muted);font-size:13px">The backend assembles context from the linked records, calls the AI provider, and returns a draft. The provider key never reaches the browser, and nothing is persisted until the user saves.</div>
  </div>
  <div class="card">
    ${secTitle('Cost design · how API spend stays low')}
    <div class="kpis">
      <div class="kpi"><div class="l">Calls per component</div><div class="v" style="color:#f0abfc;font-size:24px">1</div><div class="d">one structured call fills every field — not one call per field</div></div>
      <div class="kpi"><div class="l">Automatic calls</div><div class="v" style="color:#86efac;font-size:24px">0</div><div class="d">nothing fires on typing or focus — every call is an explicit click</div></div>
      <div class="kpi"><div class="l">Stored per suggestion</div><div class="v" style="color:#7dd3fc;font-size:24px">0 B</div><div class="d">stateless — held in the browser until the user saves</div></div>
    </div>
    <div class="kpis" style="margin-top:12px">
      <div class="kpi"><div class="l">Model tiering</div><div class="v" style="font-size:15px">cheap → heavy</div><div class="d">small model for drafting; larger model only for deliverables</div></div>
      <div class="kpi"><div class="l">Prompt caching</div><div class="v" style="font-size:15px">prompt + context</div><div class="d">reused system prompt + workspace context cached across a session</div></div>
      <div class="kpi"><div class="l">Context sent</div><div class="v" style="font-size:15px">linked only</div><div class="d">only the directly-linked records, never the whole workspace</div></div>
    </div>
    ${annot('An optional per-workspace token / credit budget plus a rate limit caps spend. Usage is read from the provider via GET /ai/usage.')}
  </div>
  <div class="twocol">
   <div><div class="card">
     ${secTitle('Two interaction modes')}
     <h3 class="dt">Component draft — the default path</h3>
     <div style="color:var(--muted);font-size:13px;margin-bottom:8px">One call fills the editable fields from a short prompt plus the linked context. Edit anything in place; nothing is stored until you save.</div>
     ${aiBanner('AI filled these fields — edit any of them, then Save. Nothing is stored yet.')}
     <div class="grid" style="margin-top:12px">
       ${Fai('Feature Name','Unified Dispatch Queue')}
       ${Fai('Feature Type','Operational')}
       ${Fai('Priority','High')}
       ${Fai('Enables Capability','Dynamic Routing')}
       ${Fai('Description','Single prioritized dispatch queue spanning Express and Ground — extended by the user to note shift-start handoff.',{area:true,full:true,edited:true})}
     </div>
     <div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap"><span class="btn primary">Save feature</span><span class="btn ghost">Clear AI fields</span><span class="mono" style="color:var(--faint);font-size:11.5px">/ai/draft fills · Save writes through the normal endpoint</span></div>
     <div style="margin-top:7px;color:var(--faint);font-size:12px">The Description shows a user edit in place — its ✦ marker becomes <span style="color:#86efac">edited</span>.</div>
     <h3 class="dt" style="margin-top:18px">Field refine — on demand only</h3>
     <div style="color:var(--muted);font-size:13px">A targeted rewrite of a single field, only when asked.</div>
     <div class="field" style="margin-top:9px"><label>Value Hypothesis</label><div class="input area">A unified network with shared optimization reduces total route miles and cost per stop.</div></div>
     <div style="display:flex;gap:8px">${aiChip('rewrite shorter')}${aiChip('make it measurable')}</div>
     <div style="margin-top:7px;color:var(--faint);font-size:12px" class="mono">POST /ai/refine — one field, minimal context</div>
   </div></div>
   <div>
    <div class="card">
     ${secTitle('Where it appears')}
     ${[['Strategic Objective','draft the framing fields'],['Lean Business Case','draft summary, problem, hypothesis'],['Discovery','draft the ten findings'],['Features & Requirements','draft features and acceptance criteria'],['Conceptual Deliverables','generate · larger model']].map(r=>`<div class="lrow" style="margin-bottom:9px"><div><div class="nm" style="font-size:13px">${r[0]}</div><div class="meta">${r[1]}</div></div><div class="rt"><span class="ai-chip" style="margin:0">✦ assist</span></div></div>`).join('')}
    </div>
    <div class="card">
     ${secTitle('Endpoints · stateless')}
     <table class="t"><thead><tr><th>Method</th><th>Endpoint</th><th>Model</th><th>Stores</th></tr></thead><tbody>
      <tr><td class="mono" style="color:#86efac">POST</td><td class="mono">/ai/draft</td><td style="color:var(--muted)">cheap</td><td style="color:var(--faint)">nothing</td></tr>
      <tr><td class="mono" style="color:#86efac">POST</td><td class="mono">/ai/refine</td><td style="color:var(--muted)">cheap</td><td style="color:var(--faint)">nothing</td></tr>
      <tr><td class="mono" style="color:#86efac">POST</td><td class="mono">/ai/suggest-links</td><td style="color:var(--muted)">cheap</td><td style="color:var(--faint)">nothing</td></tr>
      <tr><td class="mono" style="color:#7dd3fc">GET</td><td class="mono">/ai/usage</td><td style="color:var(--faint)">—</td><td style="color:var(--faint)">—</td></tr>
     </tbody></table>
    </div>
   </div>
  </div>
  <div class="note"><b>Human-in-the-loop, unchanged.</b> AI only ever proposes. The user reviews, edits, and saves — and the <span class="mono">suggested → user_finalized</span> gate still governs deliverables. The AI plugs into the gate the architecture already had.</div>`;

/* =================== nav + routing =================== */
let signedIn=false;
const NAV=[
  {label:'Public Site',gate:'always',color:'#fbbf24',items:[['landing','Landing · Overview']]},
  {label:'Account',gate:'out',color:'#22d3ee',items:[['signup','Sign Up'],['login','Log In']]},
  {label:'Account & Setup',gate:'in',color:'#22d3ee',items:[['dashboard','Dashboard'],['company','Company Profile'],['departments','Departments']]},
  {label:'Phase 1 · Strategy',gate:'in',color:'#34d399',items:[['objectives','Strategic Objectives'],['architecture','Business Architecture'],['value-streams','Value Streams'],['key-activities','Key Activities'],['capabilities','Capabilities'],['processes','Business Processes'],['personas','Stakeholders & Personas'],['information','Information Concepts'],['impacts','Business Impacts']]},
  {label:'Phase 2 · Delivery',gate:'in',color:'#a78bfa',items:[['cases','Lean Business Cases'],['discovery','Discovery'],['features','Features'],['requirements','Requirements'],['deliverables','Conceptual Deliverables'],['implementation','Implementation']]},
  {label:'AI Layer',gate:'in',color:'#e879f9',items:[['ai','AI Assistance']]},
  {label:'Session',gate:'in',color:'#fb7185',items:[['logout','Log Out']]},
];
const TITLES=Object.fromEntries(NAV.flatMap(g=>g.items));
const GROUPOF=Object.fromEntries(NAV.flatMap(g=>g.items.map(it=>[it[0],g.label])));
const GATEOF=Object.fromEntries(NAV.flatMap(g=>g.items.map(it=>[it[0],g.gate])));

function visibleNav(){return NAV.filter(g=>g.gate==='always'||(signedIn?g.gate==='in':g.gate==='out'));}
function renderNav(){
  document.getElementById('nav').innerHTML=visibleNav().map(g=>`<div class="navgroup"><h4>${g.label}</h4>${g.items.map(([id,label])=>`<div class="navitem" data-id="${id}"><span class="dot" style="background:${g.color}"></span>${label}</div>`).join('')}</div>`).join('');
  document.querySelectorAll('.navitem').forEach(el=>el.addEventListener('click',()=>go(el.dataset.id)));
}
function signIn(){ signedIn=true; renderNav(); go('dashboard'); }
function signOut(){ signedIn=false; renderNav(); go('landing'); }
function go(id){
  if(id==='logout'){ signOut(); return; }
  // route guard: gated pages require the matching auth state
  if(GATEOF[id]==='in' && !signedIn){ id='login'; }
  else if(GATEOF[id]==='out' && signedIn){ id='dashboard'; }
  document.querySelectorAll('.navitem').forEach(el=>el.classList.toggle('active',el.dataset.id===id));
  document.getElementById('crumb').innerHTML=`${GROUPOF[id]} <span style="color:var(--faint)">/</span> <b>${TITLES[id]}</b>`;
  const page=document.getElementById('page');
  page.innerHTML=(PAGES[id]||(()=>'<div class="card">Coming soon</div>'))();
  page.scrollIntoView({block:'start'});
  window.scrollTo(0,0);
  location.hash=id;
}
document.getElementById('annotToggle').addEventListener('click',()=>document.body.classList.toggle('show-annot'));
renderNav();
go((location.hash&&location.hash.slice(1))||'landing');
</script>
