name: Web CI/CD

on:
  pull_request:
    paths:
      - "Build Webpage Framework/**"
      - ".github/workflows/web.yml"
  push:
    branches:
      - main
    paths:
      - "Build Webpage Framework/**"
      - ".github/workflows/web.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and publish web app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Build Webpage Framework

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.8

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: Build Webpage Framework/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          BASE_PATH: /strategic-lifecycle-ai-framework/

      - name: Publish to gh-pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: Build Webpage Framework/dist
          force_orphan: true
